name: 📔 Diary Sync

on:
  push:
    paths:
      - "dailight/entries/**.md"

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 使用 PAT 或默认 token，确保有写权限
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate README
        run: python dailight/generate.py

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dailight/README.md
          # 若 README 没有变化则跳过 commit
          git diff --cached --quiet && echo "No changes." && exit 0
          git commit -m "📔 auto: update diary index [skip ci]"
          git push
