name: 📔 Diary Rebuild

on:
  # 手动触发：GitHub Actions 页面点击 "Run workflow"
  workflow_dispatch:

  # 每天北京时间 08:00（UTC 00:00）定时重建，刷新统计数据
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate README
        run: python dailight/generate.py

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dailight/README.md
          git diff --cached --quiet && echo "README unchanged, skipping commit." && exit 0
          git commit -m "📔 scheduled: rebuild diary index [skip ci]"
          git push
