name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-spec:
    name: Workflow Spec
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Validate CI workflow contract
        run: scripts/ci/assert-workflow.sh

      - name: Ensure legacy adaptive skill is removed
        run: scripts/ci/assert-no-adaptive-skill.sh

      - name: Ensure Hermes stage 1 migration contract
        run: scripts/ci/assert-hermes-stage1.sh

  rust:
    name: Rust Workspace
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Test workspace
        run: cargo test --workspace

  swift:
    name: Swift Native Host
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust FFI
        run: cargo build -p scriptron-ffi

      - name: Test Swift package
        run: swift test
        working-directory: macos/ScripTronNative
