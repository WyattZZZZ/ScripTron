<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScripTron</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#006b5e',
            secondary: '#7044c1',
            surface: '#f8f9fb',
            'surface-container-low': '#f0f4f7',
            'surface-container': '#e8eff3',
            'surface-container-high': '#e1e9ee',
            'on-surface': '#2a3439',
            'on-surface-variant': '#566166',
            outline: '#d9e4ea'
          },
          fontFamily: { body: ['Manrope', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-surface text-on-surface font-body h-screen overflow-hidden">
  <div id="app" class="flex h-screen">
    <aside id="sidebar" class="w-64 shrink-0 border-r border-outline bg-surface-container-low flex flex-col">
      <div id="sidebar-header" class="h-14 px-4 flex items-center border-b border-outline">
        <div id="logo" class="flex items-center gap-2">
          <span class="logo-icon material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">deployed_code</span>
          <span class="logo-text font-extrabold tracking-tight">ScripTron</span>
        </div>
      </div>

      <div id="sidebar-tabs" class="grid grid-cols-3 border-b border-outline">
        <button class="sidebar-tab active h-11 text-on-surface-variant hover:bg-surface-container" data-panel="files" title="Files">📁</button>
        <button class="sidebar-tab h-11 text-on-surface-variant hover:bg-surface-container" data-panel="marketplace" title="Marketplace">🧩</button>
        <button class="sidebar-tab h-11 text-on-surface-variant hover:bg-surface-container" data-panel="settings" title="Settings">⚙️</button>
      </div>

      <div id="panel-files" class="sidebar-panel active flex-1 min-h-0">
        <div class="panel-header"><span>Workspace</span><button id="btn-new-file" class="icon-btn" title="New .tron file">+</button></div>
        <div id="file-tree" class="flex-1 overflow-auto"></div>
      </div>

      <div id="panel-marketplace" class="sidebar-panel flex-1 min-h-0">
        <div class="panel-header"><span>CLI Marketplace</span><button id="btn-install-local" class="icon-btn" title="Install from file">+</button></div>
        <div id="marketplace-list" class="flex-1 overflow-auto"></div>
      </div>

      <div id="panel-settings" class="sidebar-panel flex-1 min-h-0">
        <div class="panel-header"><span>Settings</span></div>
        <div id="settings-content" class="flex-1 overflow-auto"></div>
      </div>
    </aside>

    <main id="main" class="flex-1 flex flex-col min-w-0 bg-surface">
      <div id="tab-bar" class="h-11 border-b border-outline bg-white/80 backdrop-blur px-1 flex items-center">
        <div id="tabs" class="flex-1 h-full flex items-end overflow-x-auto"></div>
        <button id="btn-run" class="run-btn" title="Run all cells (⌘R)" disabled>Run</button>
      </div>

      <div id="editor-area" class="flex-1 overflow-y-auto p-0">
        <div id="welcome-screen" class="h-full flex items-center justify-center">
          <div class="welcome-inner text-center">
            <span class="welcome-icon material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
            <h1 class="text-3xl font-extrabold">ScripTron</h1>
            <p class="text-on-surface-variant">Natural language automation for everyone.</p>
            <div class="welcome-actions mt-2 flex gap-3 justify-center">
              <button class="btn-primary" id="btn-welcome-new">New task</button>
              <button class="btn-secondary" id="btn-welcome-open">Open file</button>
            </div>
          </div>
        </div>
      </div>

      <div id="exec-panel" class="collapsed">
        <div id="exec-header">
          <div id="exec-title"><span id="exec-status-dot" class="status-dot idle"></span><span>Execution Log</span></div>
          <div id="exec-controls">
            <button id="btn-clear-log" class="icon-btn" title="Clear">🗑</button>
            <button id="btn-toggle-log" class="icon-btn" title="Toggle panel">
              <svg id="toggle-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="18 15 12 9 6 15"/>
              </svg>
            </button>
          </div>
        </div>
        <div id="exec-log"></div>
      </div>
    </main>
  </div>

  <div id="modal-overlay" class="hidden">
    <div id="modal-box">
      <div id="modal-title"></div>
      <div id="modal-body"></div>
      <div id="modal-footer">
        <button id="modal-cancel" class="btn-secondary">Cancel</button>
        <button id="modal-confirm" class="btn-primary">Confirm</button>
      </div>
    </div>
  </div>

  <script src="editor.js"></script>
  <script src="marketplace.js"></script>
  <script src="main.js"></script>
</body>
</html>
