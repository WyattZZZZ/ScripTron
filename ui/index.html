<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScripTron</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ── App shell ── -->
  <div id="app">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div id="sidebar-header">
        <div id="logo">
          <span class="logo-icon">⬡</span>
          <span class="logo-text">ScripTron</span>
        </div>
      </div>

      <!-- Sidebar tabs -->
      <div id="sidebar-tabs">
        <button class="sidebar-tab active" data-panel="files" title="Files">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
            <polyline points="13 2 13 9 20 9"/>
          </svg>
        </button>
        <button class="sidebar-tab" data-panel="marketplace" title="Marketplace">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
        </button>
        <button class="sidebar-tab" data-panel="settings" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>

      <!-- Files panel -->
      <div id="panel-files" class="sidebar-panel active">
        <div class="panel-header">
          <span>Workspace</span>
          <button id="btn-new-file" class="icon-btn" title="New .tron file">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
        </div>
        <div id="file-tree"></div>
      </div>

      <!-- Marketplace panel -->
      <div id="panel-marketplace" class="sidebar-panel">
        <div class="panel-header">
          <span>CLI Marketplace</span>
          <button id="btn-install-local" class="icon-btn" title="Install from file">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
        </div>
        <div id="marketplace-list"></div>
      </div>

      <!-- Settings panel -->
      <div id="panel-settings" class="sidebar-panel">
        <div class="panel-header"><span>Settings</span></div>
        <div id="settings-content"></div>
      </div>
    </aside>

    <!-- Main content -->
    <main id="main">

      <!-- Tab bar -->
      <div id="tab-bar">
        <div id="tabs"></div>
        <button id="btn-run" class="run-btn" title="Run all cells (⌘R)" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Run
        </button>
      </div>

      <!-- Editor area -->
      <div id="editor-area">
        <div id="welcome-screen">
          <div class="welcome-inner">
            <span class="welcome-icon">⬡</span>
            <h1>ScripTron</h1>
            <p>Natural language automation for everyone.</p>
            <div class="welcome-actions">
              <button class="btn-primary" id="btn-welcome-new">New task</button>
              <button class="btn-secondary" id="btn-welcome-open">Open file</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Execution log -->
      <div id="exec-panel" class="collapsed">
        <div id="exec-header">
          <div id="exec-title">
            <span id="exec-status-dot" class="status-dot idle"></span>
            <span>Execution Log</span>
          </div>
          <div id="exec-controls">
            <button id="btn-clear-log" class="icon-btn" title="Clear">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                <path d="M10 11v6"/><path d="M14 11v6"/>
              </svg>
            </button>
            <button id="btn-toggle-log" class="icon-btn" title="Toggle panel">
              <svg id="toggle-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="18 15 12 9 6 15"/>
              </svg>
            </button>
          </div>
        </div>
        <div id="exec-log"></div>
      </div>
    </main>

  </div>

  <!-- Modals -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-box">
      <div id="modal-title"></div>
      <div id="modal-body"></div>
      <div id="modal-footer">
        <button id="modal-cancel" class="btn-secondary">Cancel</button>
        <button id="modal-confirm" class="btn-primary">Confirm</button>
      </div>
    </div>
  </div>

  <script src="editor.js"></script>
  <script src="marketplace.js"></script>
  <script src="main.js"></script>
</body>
</html>
